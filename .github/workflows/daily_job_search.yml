name: Daily Job Search Agent

on:
  schedule:
    # Runs at 7:00 AM UTC = 8:00 AM German time (winter) / 9:00 AM (summer)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI for testing

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job search agent
        env:
          YOUR_EMAIL: ${{ secrets.YOUR_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          YOUR_NAME: ${{ secrets.YOUR_NAME }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python run_agent.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/seen_jobs.json
          git commit -m "Update seen jobs [automated]" || echo "No changes to commit"
          git push